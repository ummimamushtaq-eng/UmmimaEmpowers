<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Ummima Empowers</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/blog.css">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <i class="fas fa-heart"></i>
            <span>Ummima Empowers</span>
        </a>

        <ul class="nav-menu">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="blog.html" class="nav-link active">Blog</a></li>
            <li><a href="index.html#about" class="nav-link">About</a></li>
            <li><a href="index.html#contact" class="nav-link">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- BLOG HEADER -->
<section class="blog-header">
    <h1>Our Blog</h1>
    <p>Insights, Stories, and Discussions on Women's Empowerment</p>
</section>

<!-- BLOG CONTAINER -->
<div class="container">

    <div class="blog-layout">

        <!-- BLOG POSTS (DYNAMIC LOADED FROM JSON) -->
        <main class="blog-posts" id="blogPosts">
            <p style="text-align:center;">Loading blogs...</p>
        </main>

        <!-- SIDEBAR -->
        <aside class="blog-sidebar">
            <h3>Categories</h3>
            <p>Loaded from JSON</p>
        </aside>

    </div>

</div>

<!-- FOOTER -->
<footer class="footer">
    <p>&copy; 2026 Ummima Empowers</p>
</footer>

<!-- 🔥 BLOG MODAL (THIS WAS MISSING - MAIN FIX) -->
<div id="blogModal" class="blog-modal" aria-hidden="true">

    <div class="blog-modal-overlay" data-close-modal></div>

    <div class="blog-modal-content">

        <button class="blog-modal-close" data-close-modal>
            &times;
        </button>

        <div id="blogModalBody">
            <!-- Dynamic blog content loads here -->
        </div>

    </div>

</div>

<!-- JS -->
<script src="js/blog.js"></script>

</body>
</html>
